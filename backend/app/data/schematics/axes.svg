<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="JetBrains Mono, monospace">
  <title>PL45LM Axis Layout (X / Y / Z)</title>
  <desc>Synthetic labeled schematic of the X/Y/Z motion system for the PL45LM-class turn-mill. Component ids match navigate_schematic targets.</desc>
  <style>
    .frame { fill:#0e1622; stroke:#1e2733; stroke-width:2; }
    .part  { fill:#16202c; stroke:#9fb3c8; stroke-width:2; }
    .rail  { fill:#22303f; stroke:#9fb3c8; stroke-width:2; }
    .lbl   { fill:#e5edf5; font-size:15px; }
    .cap   { fill:#7d8da3; font-size:12px; }
    .lead  { stroke:#5b6b80; stroke-width:1; stroke-dasharray:3 3; }
  </style>

  <rect class="frame" x="8" y="8" width="784" height="584" rx="8"/>
  <text class="lbl" x="24" y="38" font-size="18">PL45LM — Axis Layout (X / Y / Z)</text>
  <text class="cap" x="24" y="58">Synthetic schematic · preloaded ballscrews on profile rails</text>

  <!-- Z axis (vertical column) -->
  <g id="z_axis">
    <rect class="part" x="120" y="100" width="60" height="420" rx="4"/>
    <text class="lbl" x="40" y="100">Z axis</text>
    <text class="cap" x="40" y="118">510 mm travel</text>
  </g>

  <!-- Y axis (saddle, mid depth) -->
  <g id="y_axis">
    <rect class="part" x="220" y="240" width="360" height="60" rx="4"/>
    <line class="lead" x1="400" y1="240" x2="400" y2="170"/>
    <text class="lbl" x="360" y="160">Y axis</text>
    <text class="cap" x="350" y="178">450 mm travel</text>
  </g>

  <!-- X axis (table, bottom) -->
  <g id="x_axis">
    <rect class="part" x="220" y="430" width="440" height="70" rx="4"/>
    <text class="lbl" x="610" y="425">X axis</text>
    <text class="cap" x="610" y="443">560 mm travel</text>
  </g>

  <!-- X ballscrew -->
  <g id="x_ballscrew">
    <rect class="rail" x="230" y="470" width="420" height="14" rx="7"/>
    <path d="M236 477 h408" stroke="#0e1622" stroke-width="2" stroke-dasharray="6 6"/>
    <line class="lead" x1="440" y1="484" x2="440" y2="540"/>
    <text class="lbl" x="380" y="558">X ballscrew</text>
    <text class="cap" x="360" y="576">32 mm, 10 mm lead, C3</text>
  </g>

  <!-- Linear guide -->
  <g id="linear_guide">
    <rect class="rail" x="230" y="500" width="420" height="10" rx="3"/>
    <rect class="part" x="300" y="494" width="40" height="22" rx="3"/>
    <rect class="part" x="540" y="494" width="40" height="22" rx="3"/>
    <line class="lead" x1="320" y1="494" x2="200" y2="430"/>
    <text class="lbl" x="40" y="426">Linear guide</text>
    <text class="cap" x="40" y="444">35 mm profile rail</text>
  </g>

  <!-- X servo motor -->
  <g id="x_servo_motor">
    <rect class="part" x="660" y="450" width="70" height="60" rx="6"/>
    <line class="lead" x1="660" y1="480" x2="650" y2="480"/>
    <text class="lbl" x="640" y="436">X servo</text>
    <text class="cap" x="630" y="528">3.0 kW, abs encoder</text>
  </g>
</svg>
