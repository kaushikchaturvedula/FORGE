name: Build & Deploy to Alibaba Cloud (ACR + ECS)

# On push to main: build the image, push to Alibaba Cloud Container Registry (ACR),
# then roll it out on the ECS host over SSH. All credentials come from repo secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/forge

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Backend hermetic tests
        run: |
          cd backend
          pip install -r requirements.txt
          pytest -q
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Frontend typecheck + build
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out on ECS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/forge
            export ACR_REGISTRY='${{ secrets.ACR_REGISTRY }}'
            export ACR_NAMESPACE='${{ secrets.ACR_NAMESPACE }}'
            export TAG='${{ github.sha }}'
            echo '${{ secrets.ACR_PASSWORD }}' | docker login ${{ secrets.ACR_REGISTRY }} -u '${{ secrets.ACR_USERNAME }}' --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
