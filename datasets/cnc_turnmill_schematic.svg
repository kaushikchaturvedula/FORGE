<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Geist','Inter',system-ui,sans-serif">
  <!-- ===================================================================
       FORGE CNC Turn-Mill Schematic (PL45LM-class)
       Each highlightable component is a <g> with id="cmp-<name>".
       highlight_component(name) -> add class "is-highlighted" to "cmp-<name>".
       Labels are part NAMES ONLY — no spec numbers or part codes.
       Hotspot registry keys: spindle, drawbar, chuck, turret, headstock,
       tailstock, bed, coolant_union, guard_door, control_box.
  =================================================================== -->

  <defs>
    <style>
      .part      { fill: #21262d; stroke: #8b949e; stroke-width: 2; }
      .part-2    { fill: #161b22; stroke: #8b949e; stroke-width: 2; }
      .accent    { fill: #30363d; stroke: #58a6ff; stroke-width: 1.5; }
      .label     { fill: #f0f6fc; font-size: 14px; font-weight: 600; }
      .leader    { stroke: #484f58; stroke-width: 1; stroke-dasharray: 3 3; }
      .title     { fill: #f0f6fc; font-size: 20px; font-weight: 700; }
      .subtitle  { fill: #8b949e; font-size: 12px; }

      .is-highlighted > .part,
      .is-highlighted > .part-2,
      .is-highlighted > .accent {
        stroke: #e3b341; stroke-width: 3.5;
        filter: drop-shadow(0 0 8px rgba(227,179,65,0.8));
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <text x="40" y="46" class="title">CNC Turn-Mill</text>
  <text x="40" y="66" class="subtitle">Component schematic · voice-navigable</text>

  <!-- BED / BASE -->
  <g id="cmp-bed">
    <rect class="part-2" x="120" y="430" width="660" height="70" rx="6"/>
    <rect class="part-2" x="150" y="500" width="40" height="40"/>
    <rect class="part-2" x="710" y="500" width="40" height="40"/>
  </g>

  <line class="leader" x1="140" y1="445" x2="760" y2="445"/>
  <line class="leader" x1="140" y1="460" x2="760" y2="460"/>

  <!-- HEADSTOCK -->
  <g id="cmp-headstock">
    <rect class="part" x="150" y="300" width="160" height="130" rx="6"/>
    <circle class="accent" cx="230" cy="365" r="34"/>
  </g>

  <!-- SPINDLE -->
  <g id="cmp-spindle">
    <rect class="accent" x="300" y="350" width="120" height="30" rx="4"/>
    <circle class="accent" cx="300" cy="365" r="22"/>
  </g>

  <!-- CHUCK -->
  <g id="cmp-chuck">
    <circle class="part" cx="430" cy="365" r="40"/>
    <rect class="accent" x="424" y="330" width="12" height="22"/>
    <rect class="accent" x="424" y="378" width="12" height="22"/>
    <rect class="accent" x="395" y="359" width="22" height="12"/>
    <rect class="accent" x="443" y="359" width="22" height="12"/>
  </g>

  <!-- DRAWBAR -->
  <g id="cmp-drawbar">
    <rect class="accent" x="180" y="358" width="120" height="14" rx="3"/>
    <circle class="accent" cx="190" cy="365" r="8"/>
  </g>

  <!-- TURRET -->
  <g id="cmp-turret">
    <polygon class="part" points="560,300 640,300 660,340 640,380 560,380 540,340"/>
    <circle class="accent" cx="600" cy="340" r="14"/>
    <rect class="accent" x="594" y="280" width="12" height="22"/>
    <rect class="accent" x="652" y="318" width="22" height="12"/>
  </g>

  <!-- TAILSTOCK -->
  <g id="cmp-tailstock">
    <rect class="part" x="680" y="330" width="90" height="100" rx="6"/>
    <polygon class="accent" points="660,365 680,352 680,378"/>
  </g>

  <!-- COOLANT UNION -->
  <g id="cmp-coolant_union">
    <rect class="accent" x="225" y="250" width="20" height="50" rx="3"/>
    <circle class="accent" cx="235" cy="245" r="12"/>
  </g>

  <!-- GUARD DOOR -->
  <g id="cmp-guard_door">
    <rect class="part-2" x="330" y="150" width="320" height="130" rx="6" opacity="0.5"/>
    <line class="leader" x1="490" y1="150" x2="490" y2="280"/>
  </g>

  <!-- CONTROL BOX -->
  <g id="cmp-control_box">
    <rect class="part" x="790" y="150" width="80" height="220" rx="6"/>
    <rect class="accent" x="802" y="165" width="56" height="44" rx="3"/>
    <circle class="accent" cx="815" cy="235" r="7"/>
    <circle class="accent" cx="845" cy="235" r="7"/>
    <rect class="accent" x="806" y="265" width="48" height="8" rx="2"/>
    <rect class="accent" x="806" y="285" width="48" height="8" rx="2"/>
    <circle fill="#ff7b72" cx="845" cy="320" r="9"/>
  </g>

  <!-- LABELS (NAMES ONLY) -->
  <g class="label-layer">
    <line class="leader" x1="230" y1="245" x2="230" y2="120"/>
    <text x="180" y="116" class="label">Coolant union</text>

    <line class="leader" x1="190" y1="365" x2="80" y2="365"/>
    <text x="20" y="369" class="label">Drawbar</text>

    <line class="leader" x1="230" y1="365" x2="230" y2="300"/>
    <text x="150" y="540" class="label">Headstock</text>

    <line class="leader" x1="360" y1="365" x2="360" y2="430"/>
    <text x="328" y="565" class="label">Spindle</text>

    <line class="leader" x1="430" y1="405" x2="430" y2="460"/>
    <text x="408" y="540" class="label">Chuck</text>

    <line class="leader" x1="600" y1="280" x2="600" y2="200"/>
    <text x="566" y="192" class="label">Turret</text>

    <line class="leader" x1="725" y1="430" x2="725" y2="470"/>
    <text x="690" y="540" class="label">Tailstock</text>

    <line class="leader" x1="830" y1="370" x2="830" y2="400"/>
    <text x="788" y="540" class="label">Control box</text>
  </g>
</svg>
