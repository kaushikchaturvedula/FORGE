# FORGE reverse proxy for Alibaba Cloud ECS.
# The whole point of choosing ECS over SAE/Function Compute is full control of the
# proxy timeouts for long-lived (up to ~120 min) realtime WebSocket sessions.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # ── Realtime WebSocket bridge — long-lived, must not idle-timeout ────────
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hold the connection open well past the 120-min realtime session cap.
        proxy_read_timeout 7800s;   # 130 min
        proxy_send_timeout 7800s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
    }

    # ── HTTP API + static console ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
